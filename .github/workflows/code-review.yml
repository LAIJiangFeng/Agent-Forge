name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=50
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | head -n 200 > /tmp/changed_files.txt
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- \
            '*.ts' '*.tsx' '*.vue' \
            '*.js' '*.jsx' '*.mjs' '*.cjs' \
            '*.css' '*.scss' '*.less' \
            '*.json' '*.yml' '*.yaml' '*.md' '*.html' | head -n 2500 > /tmp/pr_diff.txt

      - name: Read review standards
        id: standards
        run: |
          cp .github/review-standards/review-standard-v2.md /tmp/review_standard.txt
          cp .github/review-standards/project-review-focus.md /tmp/project_focus.txt

      - name: Codex Code Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${OPENAI_BASE_URL:-}" ]; then
            echo "⚠️ 缺少仓库密钥 OPENAI_API_KEY 或 OPENAI_BASE_URL。" > /tmp/review_result.txt
            exit 0
          fi

          if [ ! -s /tmp/pr_diff.txt ]; then
            CHANGED_FILES="$(cat /tmp/changed_files.txt || true)"
            echo "ℹ️ 当前 PR 存在改动，但在可审查类型中过滤后无 diff。已跟踪文件：${CHANGED_FILES}" > /tmp/review_result.txt
            exit 0
          fi

          API_BASE_URL="${OPENAI_BASE_URL%/}"

          # Build request payload via Python to avoid shell escaping issues.
          python3 << 'PYTHON_EOF'
          import json

          with open('/tmp/review_standard.txt', 'r', encoding='utf-8') as f:
              standard = f.read()
          with open('/tmp/project_focus.txt', 'r', encoding='utf-8') as f:
              focus = f.read()
          with open('/tmp/pr_diff.txt', 'r', encoding='utf-8', errors='replace') as f:
              diff = f.read()

          prompt = f"""你是一位资深代码审查助手。请严格按以下规范审查本次 PR 代码差异，并且必须使用中文输出。

          ## 审查标准
          {standard}

          ## 项目审查重点
          {focus}

          ## 本次 PR 代码差异
          ```diff
          {diff}
          ```

          输出格式要求：
          1. 问题分级列表（🔴严重 / 🟡中等 / 🟢轻微），每个问题要包含原因、位置、修改建议
          2. 📊 质量评分（满分 100）和星级评定
          3. 🐛 问题统计
          4. 📝 综合评语
          5. ✅ 审查结论（Approve / Request Changes / Comment Only）"""

          payload = {
              "model": "gpt-5.3-codex",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 4096,
              "temperature": 0.3,
          }

          with open('/tmp/api_payload.json', 'w', encoding='utf-8') as f:
              f.write(json.dumps(payload, ensure_ascii=False))
          PYTHON_EOF

          MAX_ATTEMPTS=3
          ATTEMPT=1
          HTTP_CODE="000"
          RESPONSE=""

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            HTTP_CODE=$(curl -sS -o /tmp/api_response.txt -w "%{http_code}" \
              --connect-timeout 15 --max-time 180 \
              -X POST "${API_BASE_URL}/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -d @/tmp/api_payload.json || echo "000")

            RESPONSE="$(cat /tmp/api_response.txt 2>/dev/null || true)"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              break
            fi

            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ] && { [ "$HTTP_CODE" = "429" ] || [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "503" ] || [ "$HTTP_CODE" = "504" ] || [ "$HTTP_CODE" = "000" ]; }; then
              sleep $((ATTEMPT * 5))
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            break
          done

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            SNIPPET=$(printf "%s" "$RESPONSE" | tr '\n' ' ' | head -c 500)
            echo "⚠️ 代码审查 API 返回了非 JSON 响应（HTTP ${HTTP_CODE}，重试 ${ATTEMPT}/${MAX_ATTEMPTS} 次）。响应片段：${SNIPPET}" > /tmp/review_result.txt
            exit 0
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // .message // "Unknown error"')
            echo "⚠️ 代码审查 API 请求失败（HTTP ${HTTP_CODE}，重试 ${ATTEMPT}/${MAX_ATTEMPTS} 次）：${ERROR}" > /tmp/review_result.txt
            exit 0
          fi

          # Support both chat-completions and responses-like payload shapes.
          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '
            if (.choices[0].message.content? | type) == "string" then
              .choices[0].message.content
            elif (.choices[0].message.content? | type) == "array" then
              [ .choices[0].message.content[]? | if type == "string" then . elif type == "object" then (.text? // .content? // empty) else empty end ] | join("\n")
            else
              (.output_text // empty)
            end
          ')
          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY=$(echo "$RESPONSE" | jq -r '[.output[]?.content[]?.text // empty] | join("\n")')
          fi

          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY="⚠️ 代码审查 API 返回了 JSON，但未包含可解析的审查内容。"
          fi

          echo "$REVIEW_BODY" > /tmp/review_result.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('/tmp/review_result.txt', 'utf8');
            const body = `## 🤖 Codex 自动代码审查\n\n${reviewBody}\n\n---\n_Powered by gpt-5.3-codex | PR #${context.issue.number}_`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

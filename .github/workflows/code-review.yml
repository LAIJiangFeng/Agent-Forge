name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=50
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- '*.ts' '*.vue' '*.js' '*.css' '*.json' | head -c 80000 > /tmp/pr_diff.txt

      - name: Read review standards
        id: standards
        run: |
          cp .github/review-standards/review-standard-v2.md /tmp/review_standard.txt
          cp .github/review-standards/project-review-focus.md /tmp/project_focus.txt

      - name: Codex Code Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${OPENAI_BASE_URL:-}" ]; then
            echo "⚠️ Missing OPENAI_API_KEY or OPENAI_BASE_URL repository secret." > /tmp/review_result.txt
            exit 0
          fi

          API_BASE_URL="${OPENAI_BASE_URL%/}"

          # Build request payload via Python to avoid shell escaping issues.
          python3 << 'PYTHON_EOF'
          import json

          with open('/tmp/review_standard.txt', 'r', encoding='utf-8') as f:
              standard = f.read()
          with open('/tmp/project_focus.txt', 'r', encoding='utf-8') as f:
              focus = f.read()
          with open('/tmp/pr_diff.txt', 'r', encoding='utf-8') as f:
              diff = f.read()

          prompt = f"""You are a senior code review assistant. Review this pull request diff strictly using the standards below.

          ## Review Standard
          {standard}

          ## Project Focus
          {focus}

          ## Pull Request Diff
          ```diff
          {diff}
          ```

          Output format requirements:
          1. Issues grouped by severity (Critical / Medium / Minor), each with reason, location, and fix suggestion
          2. Quality score out of 100 and star rating
          3. Issue statistics
          4. Overall summary
          5. Final conclusion (Approve / Request Changes / Comment Only)"""

          payload = {
              "model": "gpt-5.3-codex",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 4096,
              "temperature": 0.3,
          }

          with open('/tmp/api_payload.json', 'w', encoding='utf-8') as f:
              f.write(json.dumps(payload, ensure_ascii=False))
          PYTHON_EOF

          HTTP_CODE=$(curl -sS -o /tmp/api_response.txt -w "%{http_code}" -X POST "${API_BASE_URL}/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d @/tmp/api_payload.json)

          RESPONSE=$(cat /tmp/api_response.txt)

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            SNIPPET=$(printf "%s" "$RESPONSE" | tr '\n' ' ' | head -c 500)
            echo "⚠️ Code review API returned non-JSON response (HTTP ${HTTP_CODE}). Response snippet: ${SNIPPET}" > /tmp/review_result.txt
            exit 0
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // .message // "Unknown error"')
            echo "⚠️ Code review API request failed (HTTP ${HTTP_CODE}): ${ERROR}" > /tmp/review_result.txt
            exit 0
          fi

          # Support both chat-completions and responses-like payload shapes.
          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // .output_text // empty')
          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY=$(echo "$RESPONSE" | jq -r '[.output[]?.content[]?.text // empty] | join("\n")')
          fi

          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY="⚠️ Code review API returned JSON but no review content."
          fi

          echo "$REVIEW_BODY" > /tmp/review_result.txt

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('/tmp/review_result.txt', 'utf8');
            const body = `## 🤖 Codex Automated Code Review\n\n${reviewBody}\n\n---\n_Powered by gpt-5.3-codex | PR #${context.issue.number}_`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
